catalogMode: prefer
minimumReleaseAge: 0
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - docs
  - packages/**
  - evals/**
  - examples/**
  - '!**/dist/**'
overrides:
  array-flatten: npm:@nolyfill/array-flatten@^1.0.44
  axios: npm:feaxios@^0.0.23
  is-core-module: npm:@nolyfill/is-core-module@^1.0.39
  isarray: npm:@nolyfill/isarray@^1.0.44
  onnxruntime-web: npm:onnxruntime-web@^1.27.0
  safe-buffer: npm:@nolyfill/safe-buffer@^1.0.44
  safer-buffer: npm:@nolyfill/safer-buffer@^1.0.44
  side-channel: npm:@nolyfill/side-channel@^1.0.44
  string.prototype.matchall: npm:@nolyfill/string.prototype.matchall@^1.0.44
catalog:
  '@antfu/eslint-config': ^9.1.0
  '@arethetypeswrong/core': ^0.18.4
  '@henrygd/queue': ^1.2.0
  '@moeru/eslint-config': 0.1.0-beta.15
  '@moeru/std': 0.1.0-beta.17
  '@opentelemetry/api': ^1.9.1
  '@pnpm/find-workspace-dir': ^1000.1.5
  '@shikijs/transformers': 3.23.0
  '@types/node': ^26.1.0
  '@unocss/eslint-plugin': ^66.7.4
  '@unocss/reset': ^66.7.4
  '@vitest/runner': ^4.1.9
  '@voidzero-dev/vitepress-theme': ^4.8.4
  '@vue/tsconfig': ^0.9.1
  '@xsai-ext/providers': 0.5.0-beta.6
  '@xsai/generate-text': 0.5.0-beta.6
  '@xsai/providers': ^0.1.0-beta.5
  bumpp: ^11.1.0
  c12: ^4.0.0-beta.5
  date-fns: ^4.4.0
  es-toolkit: 1.43.0
  eslint: ^10.6.0
  eslint-plugin-oxlint: ^1.72.0
  fast-string-width: ^3.0.2
  meow: ^14.1.0
  nano-staged: ^1.0.2
  oxc-minify: ^0.138.0
  oxlint: ^1.72.0
  publint: ^0.3.21
  rollup: ^4.62.2
  simple-git-hooks: ^2.13.1
  taze: ^19.14.1
  tinyexec: ^1.2.4
  tinyglobby: ^0.2.17
  tinyrainbow: ^3.1.0
  tsdown: ^0.22.3
  tsx: ^4.23.0
  turbo: ^2.10.3
  typescript: ^6.0.3
  unocss: ^66.7.4
  unplugin-raw: ^0.7.0
  unplugin-unused: ^0.5.7
  vite: ^8.1.3
  vite-plugin-inspect: ^11.4.1
  vitepress: 2.0.0-alpha.16
  vue: ^3.5.39
  xsai: ^0.5.0-beta.6
catalogs:
  vitest:
    '@vitest/coverage-v8': ^4.1.9
    '@vitest/expect': ^4.1.9
    vitest: ^4.1.9
ignoredBuiltDependencies:
  - simple-git-hooks # [workaround] postinstall script bundled in simple-git-hooks fails to execute with `enableGlobalVirtualStore: true`. Using local postinstall script to run `npx simple-git-hooks` instead.
onlyBuiltDependencies:
  - esbuild
  - vue-demi
allowBuilds:
  esbuild: true
  simple-git-hooks: true
  vue-demi: true
